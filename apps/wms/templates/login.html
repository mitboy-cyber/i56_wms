<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>登录 - I56 Framework</title>
<link rel="stylesheet" href="/static/css/i56-bdl.css">
</head>
<body class="login-page">
<div class="login-card">
  <div class="login-logo">I</div>
  <div class="login-title">I56 Framework</div>
  <div class="login-subtitle">企业级物流管理平台</div>
  <form method="POST" action="/login">
    <div class="form-group">
      <label class="form-label">账号</label>
      <input class="form-input" type="text" name="username" placeholder="请输入账号" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" type="password" name="password" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn btn-primary w-full" style="width:100%">登录</button>
    {{if .Error}}<p class="text-sm text-center mt-3" style="color:var(--i56-error)">{{.Error}}</p>{{end}}
  </form>
</div>
</body>
</html>
