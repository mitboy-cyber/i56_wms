<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{block "title" .}}I56 Framework{{end}}</title>
<link rel="stylesheet" href="/static/css/i56-bdl.css">
<script src="/static/js/i56-theme.js"></script>
<script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
<button class="i56-mobile-menu" onclick="toggleMobileSidebar()" style="position:fixed;top:12px;left:12px;z-index:1001;background:var(--i56-brand);color:#fff;border:none;border-radius:6px;padding:8px 12px;font-size:18px;cursor:pointer">☰</button>
<div class="i56-sidebar-overlay" id="mobileSidebarOverlay" onclick="closeMobileSidebar()"></div>
<div class="app-layout">
{{template "sidebar" .}}

<div class="app-main">
  <header class="app-header">
    <div class="header-breadcrumb">
      I56 Admin <span style="color:var(--i56-text-muted);margin:0 4px">/</span> <span>{{block "breadcrumb" .}}首页{{end}}</span>
    </div>
    <div class="header-actions">
      <button class="i56-btn i56-btn-sm i56-btn-ghost" onclick="I56Theme.toggle()" title="切换主题">🌓</button>
    </div>
  </header>
  <main class="app-content">
    {{block "content" .}}{{end}}
  </main>
  <footer style="margin-top:16px;padding:10px 20px;border-top:1px solid var(--i56-border);text-align:center;font-size:11px;color:var(--i56-text-muted)">
    &copy; 2026 I56 Framework v2.4 LTS
  </footer>
</div>

</div>
<!-- I56 2.0 AI Command Bar (Ctrl+K) -->

<div id="i56-ai-bar" class="ai-command-bar" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:10000;background:var(--i56-bg-card);border-top:2px solid var(--i56-brand);padding:16px 24px;box-shadow:0 -8px 32px rgba(0,0,0,0.08);backdrop-filter:blur(12px);font-family:Inter,sans-serif">
  <div style="display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto">
    <span style="font-size:24px">🤖</span>
    <input id="ai-bar-input" style="flex:1;border:none;outline:none;font-size:16px;padding:12px 16px;border-radius:8px;background:var(--i56-bg-base);color:var(--i56-text-primary)" placeholder="输入指令：查订单、查包裹、问库存..." onkeydown="if(event.key==='Enter')aiBarSend()" onfocus="document.getElementById('i56-ai-bar').querySelector('.ai-suggestions').style.display='flex'" autofocus>
    <button onclick="aiBarSend()" style="background:var(--i56-brand);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">发送</button>
    <button onclick="aiBarHide()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--i56-text-secondary)">✕</button>
  </div>
  <div class="ai-suggestions" style="display:none;gap:8px;max-width:800px;margin:12px auto 0;flex-wrap:wrap">
    <span onclick="aiBarFill(this)" style="background:var(--i56-bg-base);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--i56-border)">📋 查订单</span>
    <span onclick="aiBarFill(this)" style="background:var(--i56-bg-base);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--i56-border)">📦 查包裹</span>
    <span onclick="aiBarFill(this)" style="background:var(--i56-bg-base);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--i56-border)">🏗️ 仓库清单</span>
    <span onclick="aiBarFill(this)" style="background:var(--i56-bg-base);padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--i56-border)">💰 客户余额</span>
  </div>
  <div id="ai-bar-response" style="max-width:800px;margin:8px auto 0;font-size:14px;color:var(--i56-text-secondary);display:none"></div>
</div>
<!-- Modal container for add/edit forms -->
<div id="modal-container" style="display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;background:rgba(0,0,0,0.4)"></div>

<style>
/* Mobile sidebar */
.i56-sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:999}
.i56-sidebar-overlay.show{display:block}
@media (max-width:768px){
  .i56-mobile-menu{display:block!important}
  .app-sidebar{position:fixed;top:0;left:-260px;width:260px;height:100vh;z-index:1000;transition:left .3s;overflow-y:auto}
  .app-sidebar.open{left:0}
  .app-main{margin-left:0!important}
}
@media (min-width:769px){
  .i56-mobile-menu{display:none!important}
  .app-sidebar{left:0!important}
}
</style>

<script>
function toggleMobileSidebar(){
  document.querySelector('.app-sidebar').classList.toggle('open');
  document.getElementById('mobileSidebarOverlay').classList.toggle('show');
}
function closeMobileSidebar(){
  document.querySelector('.app-sidebar').classList.remove('open');
  document.getElementById('mobileSidebarOverlay').classList.remove('show');
}
/* ── AI Command Bar ── */
function aiBarShow(){document.getElementById('i56-ai-bar').style.display='block';document.getElementById('ai-bar-input').focus()}
function aiBarHide(){document.getElementById('i56-ai-bar').style.display='none';document.getElementById('ai-bar-response').style.display='none'}
function aiBarFill(el){document.getElementById('ai-bar-input').value=el.textContent.trim();document.getElementById('ai-bar-input').focus()}
async function aiBarSend(){
  const inp=document.getElementById('ai-bar-input'); const rsp=document.getElementById('ai-bar-response');
  const msg=inp.value.trim(); if(!msg) return;
  rsp.style.display='block'; rsp.innerHTML='🤔 思考中...';
  try{
    const res=await fetch('/api/ai/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const data=await res.json();
    rsp.innerHTML='<strong>AI:</strong> '+data.content;
  }catch(e){rsp.innerHTML='AI 服务暂时不可用'}
}
document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();aiBarShow()}});

/* ── Sidebar Expand/Collapse ── */
function toggleNavGroup(header) {
  const group = header.parentElement;
  const wasOpen = group.classList.contains('open');
  // Close all other groups
  document.querySelectorAll('.nav-group.open').forEach(function(g) {
    if (g !== group) g.classList.remove('open');
  });
  // Toggle current
  if (wasOpen) { group.classList.remove('open'); }
  else { group.classList.add('open'); }
}

/* ── Auto-expand groups based on current URL ── */
(function() {
  var currentUrl = window.location.pathname;
  var subItems = document.querySelectorAll('.nav-sub-item');
  var matched = false;
  subItems.forEach(function(item) {
    var href = item.getAttribute('href');
    if (href && currentUrl.startsWith(href.split('?')[0]) && href.split('?')[0] !== '/admin') {
      item.classList.add('active');
      var group = item.closest('.nav-group');
      if (group) group.classList.add('open');
      matched = true;
    }
  });
  // Also expand groups by data-page attribute (match URL segment)
  if (!matched) {
    var urlParts = currentUrl.replace(/^\/+|\/+$/g, '').split('/');
    var pageSeg = urlParts[urlParts.length - 1] || '';
    var groups = document.querySelectorAll('.nav-group[data-page]');
    groups.forEach(function(group) {
      var dp = group.getAttribute('data-page');
      // Check if current page is in a known group based on known URL patterns
      var groupPages = {
        'oms': ['orders', 'service-orders'],
        'wms': ['parcels', 'service-workorders', 'service-templates', 'service-types', 'pda-sessions', 'warehouses', 'inbound-board', 'warehouse-console', 'task-monitor', 'pda-workorder-templates', 'workflow-management', 'work-orders', 'exception-reports'],
        'fin': ['report/order-profit', 'report/service-profit', 'report/client-profit', 'report/route-profit'],
        'tms': ['area-groups', 'cargo-types', 'carriers', 'container-loadings', 'couriers', 'customs-brokers', 'customs-points', 'route-templates', 'shipping-providers', 'transport-modes', 'logistics-tracking'],
        'crm': ['customer-addresses', 'customer-declarants', 'clients', 'client-accounts', 'client-members', 'client-recharge', 'balance-logs', 'recharge-records', 'client-pricing', 'monthly-statements', 'client-permissions'],
        'sys': ['notifications', 'print-templates', 'roles', 'employees', 'system-params', 'system/api-couriers', 'system/api-customs', 'system/api-ezway', 'system/api-notifications', 'system/api-storage', 'system/api-printers', 'system/api-devices', 'system/scheduler', 'system/audit-logs', 'system/reports', 'system/ai-settings']
      };
      var pages = groupPages[dp] || [];
      for (var i = 0; i < pages.length; i++) {
        if (currentUrl.indexOf('/admin/' + pages[i]) === 0) {
          group.classList.add('open');
          matched = true;
          break;
        }
      }
    });
  }
  // Un-mark 首页 active if we're on a different page
  var topItems = document.querySelectorAll('a.nav-item:not(.nav-sub-item)');
  topItems.forEach(function(item) {
    var href = item.getAttribute('href');
    if (href && currentUrl === href.split('?')[0]) {
      item.classList.add('active');
    } else if (href === '/admin' && currentUrl !== '/admin') {
      item.classList.remove('active');
    }
  });
})();
</script>
</body>
</html>

<!-- I56 AI Assistant Bubble -->
<style>
.i56-ai-bubble{position:fixed;bottom:20px;right:20px;z-index:9998}
.i56-ai-toggle{width:48px;height:48px;border-radius:50%;background:var(--i56-brand);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.2);transition:transform .2s}
.i56-ai-toggle:hover{transform:scale(1.1)}
.i56-ai-panel{position:fixed;bottom:80px;right:20px;width:380px;max-height:520px;background:var(--i56-bg-surface);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.15);display:none;flex-direction:column;overflow:hidden;z-index:9999}
.i56-ai-header{padding:12px 16px;background:var(--i56-brand);color:#fff;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.i56-ai-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer}
.i56-ai-messages{flex:1;overflow-y:auto;padding:12px;max-height:360px;display:flex;flex-direction:column;gap:8px}
.i56-ai-msg{max-width:85%;padding:8px 12px;border-radius:8px;font-size:13px;line-height:1.5;word-break:break-word}
.i56-ai-msg-user{background:var(--i56-brand);color:#fff;align-self:flex-end}
.i56-ai-msg-ai{background:var(--i56-bg-surface-hover);align-self:flex-start}
.i56-ai-welcome{text-align:center;color:var(--i56-text-muted);font-size:12px;padding:8px}
.i56-ai-input{display:flex;padding:8px;border-top:1px solid var(--i56-border);background:var(--i56-bg-surface)}
.i56-ai-input input{flex:1;border:1px solid var(--i56-border);border-radius:6px;padding:8px 12px;font-size:13px;outline:none}
.i56-ai-input input:focus{border-color:var(--i56-brand)}
.i56-ai-input button{background:var(--i56-brand);color:#fff;border:none;border-radius:6px;padding:8px 14px;margin-left:6px;cursor:pointer;font-size:14px}
@media(max-width:480px){.i56-ai-panel{width:calc(100vw-16px);right:8px;left:8px;bottom:72px}}
</style>
<div class="i56-ai-bubble">
  <button class="i56-ai-toggle" onclick="I56AI.toggle()" title="AI 助手">🤖</button>
  <div class="i56-ai-panel" id="i56-ai-panel">
    <div class="i56-ai-header">
      <span>🤖 I56 AI 助手</span>
      <button class="i56-ai-close" onclick="I56AI.close()">✕</button>
    </div>
    <div class="i56-ai-messages" id="i56-ai-messages">
      <div class="i56-ai-welcome">您好！我是I56 AI助手，可以帮您查询订单、包裹、客户信息。</div>
    </div>
    <form class="i56-ai-input" onsubmit="I56AI.send(event)">
      <input type="text" id="i56-ai-query" placeholder="输入问题，如：本月订单量？" />
      <button type="submit">➤</button>
    </form>
  </div>
</div>
<script>
var I56AI={toggle:function(){var p=document.getElementById("i56-ai-panel");p.style.display=p.style.display==="flex"?"none":"flex";if(p.style.display==="flex")document.getElementById("i56-ai-query").focus()},close:function(){document.getElementById("i56-ai-panel").style.display="none"},send:function(e){e.preventDefault();var i=document.getElementById("i56-ai-query"),q=i.value.trim();if(!q)return;var m=document.getElementById("i56-ai-messages");m.innerHTML+='<div class="i56-ai-msg i56-ai-msg-user">'+q.replace(/</g,"&lt;")+"</div>";i.value="";var d=document.createElement("div");d.className="i56-ai-msg i56-ai-msg-ai";d.textContent="思考中...";m.appendChild(d);m.scrollTop=m.scrollHeight;fetch("/api/v1/ai/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:q})}).then(function(r){return r.text()}).then(function(t){d.textContent=t||"抱歉，暂时无法回答。";m.scrollTop=m.scrollHeight}).catch(function(){d.textContent="网络错误，请稍后重试。"})}};
document.addEventListener("keydown",function(e){if(e.ctrlKey&&e.key==="k"){e.preventDefault();I56AI.toggle()}});
</script>
