{{template "base.html" .}}
{{define "title"}}PDA 登录{{end}}
{{define "header"}}
<div style="width:100%;text-align:center;font-size:16px;font-weight:700">I56 WMS 仓库管理</div>
{{end}}
{{define "content"}}
<div style="max-width:320px;margin:60px auto 0;text-align:center;padding:0 16px">
  <div style="margin-bottom:28px">
    <div style="font-size:56px;margin-bottom:8px;line-height:1">🏭</div>
    <div style="font-size:20px;font-weight:800;margin-bottom:2px">I56 PDA</div>
    <div style="font-size:12px;color:var(--pda-text-muted)">仓库手持终端 · 移动操作平台</div>
  </div>

  {{if .Error}}
  <div style="border:1px solid var(--pda-danger);border-radius:8px;background:rgba(239,68,68,.08);padding:10px;margin-bottom:16px">
    <div style="font-size:13px;color:var(--pda-danger);text-align:center">⚠️ {{.Error}}</div>
  </div>
  {{end}}

  <form method="POST" action="/pda/login" style="text-align:left">
    <div style="margin-bottom:16px">
      <label style="font-size:12px;color:var(--pda-text-muted);font-weight:600;display:block;margin-bottom:6px">操作员编号</label>
      <input type="text" name="code" id="code-input" 
             placeholder="输入工号，如 OP001" 
             value="{{.Code}}" 
             autocomplete="off" autofocus
             style="display:block;width:100%;height:48px;padding:0 14px;border:2px solid var(--pda-border);border-radius:8px;background:var(--pda-surface-raised);color:var(--pda-text);font-size:16px;font-family:inherit;outline:none;box-sizing:border-box">
    </div>
    <div style="margin-bottom:20px">
      <label style="font-size:12px;color:var(--pda-text-muted);font-weight:600;display:block;margin-bottom:6px">PIN 码</label>
      <input type="password" name="pin" 
             placeholder="输入 4 位 PIN 码" 
             maxlength="4" 
             inputmode="numeric" pattern="[0-9]*" 
             autocomplete="off"
             style="display:block;width:100%;height:48px;padding:0 14px;border:2px solid var(--pda-border);border-radius:8px;background:var(--pda-surface-raised);color:var(--pda-text);font-size:16px;font-family:inherit;outline:none;box-sizing:border-box;text-align:center;letter-spacing:6px">
    </div>
    <button type="submit" style="display:block;width:100%;height:48px;background:var(--pda-brand);color:#fff;border:none;border-radius:var(--pda-radius-sm);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit">
      登 录
    </button>
  </form>

  <div style="margin-top:20px;font-size:11px;color:var(--pda-text-muted)">
    测试账号：OP001 / 1234
  </div>
</div>

<script>
(function(){
  var inp = document.getElementById('code-input');
  // 阻止任何意外修改: 去掉所有CSS类的副作用
  inp.className = '';
  inp.style.textIndent = '0';
  inp.style.letterSpacing = 'normal';
  // 去掉可能的自动大写
  inp.setAttribute('autocorrect', 'off');
  inp.setAttribute('autocapitalize', 'off');
  inp.setAttribute('spellcheck', 'false');
  // 确保 focus
  setTimeout(function(){ inp.focus(); }, 300);
})();
</script>
{{end}}
