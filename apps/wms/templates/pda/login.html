{{template "base.html" .}}
{{define "title"}}PDA 登录{{end}}
{{define "header"}}
<div style="width:100%;text-align:center;font-size:16px;font-weight:700">I56 WMS 仓库管理</div>
{{end}}
{{define "content"}}
<div class="pda-content" style="padding-top:60px;text-align:center">
  <div style="margin-bottom:32px">
    <div style="font-size:64px;margin-bottom:12px;line-height:1">🏭</div>
    <div style="font-size:22px;font-weight:800;margin-bottom:4px">I56 PDA</div>
    <div style="font-size:13px;color:var(--pda-text-muted)">仓库手持终端 · 移动操作平台</div>
  </div>

  {{if .Error}}
  <div class="pda-card" style="border-color:var(--pda-danger);background:rgba(239,68,68,.1);margin-bottom:16px">
    <div style="font-size:13px;color:var(--pda-danger);text-align:center;display:flex;align-items:center;justify-content:center;gap:6px">
      ⚠️ {{.Error}}
    </div>
  </div>
  {{end}}

  <form method="POST" action="/pda/login" style="text-align:left">
    <div style="margin-bottom:20px">
      <div style="font-size:12px;color:var(--pda-text-muted);margin-bottom:8px;font-weight:600">操作员编号</div>
      <input type="text" name="code" class="pda-input" placeholder="输入工号，如 OP001" autofocus
             value="{{.Code}}" style="font-size:18px;text-align:center;letter-spacing:4px" autocomplete="off" inputmode="text">
    </div>
    <div style="margin-bottom:24px">
      <div style="font-size:12px;color:var(--pda-text-muted);margin-bottom:8px;font-weight:600">PIN 码</div>
      <input type="password" name="pin" class="pda-input" placeholder="输入 4 位 PIN 码"
             maxlength="4" style="font-size:18px;text-align:center;letter-spacing:12px"
             inputmode="numeric" pattern="[0-9]*" autocomplete="off">
    </div>
    <button type="submit" class="pda-btn pda-btn-primary pda-btn-lg" style="margin-top:8px">
      <span style="font-size:18px">登 录</span>
    </button>
  </form>

  <div style="margin-top:24px;font-size:11px;color:var(--pda-text-muted);display:flex;align-items:center;justify-content:center;gap:8px">
    <span style="width:40px;height:1px;background:var(--pda-border)"></span>
    默认测试账号：OP001 / 1234
    <span style="width:40px;height:1px;background:var(--pda-border)"></span>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function(){
  var f = document.querySelector('input[autofocus]');
  if (f) setTimeout(function(){ f.focus(); }, 200);
});
</script>
{{end}}
