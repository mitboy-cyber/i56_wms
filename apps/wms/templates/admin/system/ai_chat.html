<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 助手 - I56</title>
<link rel="stylesheet" href="/static/css/i56-bdl.css">
<script src="/static/js/i56-theme.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:var(--i56-bg-base);color:var(--i56-text-primary);height:100vh;display:flex;flex-direction:column}
.ai-chat-panel{display:flex;flex-direction:column;height:100%;max-width:900px;margin:0 auto;width:100%}
.ai-header{background:var(--i56-bg-surface);border-bottom:1px solid var(--i56-border);padding:16px 24px;display:flex;align-items:center;gap:12px}
.ai-header h2{font-size:18px;font-weight:600;color:var(--i56-brand)}
.ai-header .ai-status{font-size:11px;padding:3px 8px;border-radius:10px;background:#22c55e20;color:#22c55e}
.ai-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.ai-welcome{background:var(--i56-bg-surface);border:1px solid var(--i56-border);border-radius:12px;padding:16px 20px;font-size:14px;color:var(--i56-text-secondary);text-align:center;margin-bottom:8px}
.ai-msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word}
.ai-msg-user{align-self:flex-end;background:var(--i56-brand);color:#fff;border-bottom-right-radius:4px}
.ai-msg-ai{align-self:flex-start;background:var(--i56-bg-surface);border:1px solid var(--i56-border);color:var(--i56-text-primary);border-bottom-left-radius:4px}
.ai-msg-ai.typing{opacity:.7}
.ai-input-wrap{border-top:1px solid var(--i56-border);padding:16px 24px;background:var(--i56-bg-surface)}
.ai-input-form{display:flex;gap:10px}
.ai-input-form input{flex:1;padding:12px 16px;border:1px solid var(--i56-border);border-radius:10px;background:var(--i56-bg-base);color:var(--i56-text-primary);font-size:14px;outline:none}
.ai-input-form input:focus{border-color:var(--i56-brand)}
.ai-input-form button{background:var(--i56-brand);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.ai-input-form button:hover{opacity:.9}
.ai-input-form button:disabled{opacity:.5;cursor:not-allowed}
.ai-quick-btns{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ai-quick-btn{font-size:11px;padding:5px 12px;border-radius:14px;border:1px solid var(--i56-border);background:var(--i56-bg-base);color:var(--i56-text-secondary);cursor:pointer;white-space:nowrap}
.ai-quick-btn:hover{background:var(--i56-brand);color:#fff;border-color:var(--i56-brand)}
</style>
</head>
<body>
<div class="ai-chat-panel">
  <div class="ai-header">
    <span style="font-size:24px">🤖</span>
    <h2>I56 AI 助手</h2>
    <span class="ai-status">● 在线</span>
    <span style="font-size:11px;color:var(--i56-text-muted);margin-left:auto">提问订单、包裹、仓库、财务信息</span>
  </div>

  <div class="ai-messages" id="ai-messages">
    <div class="ai-welcome">
      🤖 <strong>I56 AI 助手</strong> — 我是您的智能仓库助手<br>
      <span style="font-size:12px;color:var(--i56-text-muted)">您可以询问：订单查询 · 包裹状态 · 仓库库存 · 客户信息 · 财务报表</span>
    </div>
  </div>

  <div class="ai-input-wrap">
    <div class="ai-quick-btns">
      <span class="ai-quick-btn" onclick="quickAsk('本月订单量多少？')">📋 订单统计</span>
      <span class="ai-quick-btn" onclick="quickAsk('有哪些包裹？')">📦 包裹列表</span>
      <span class="ai-quick-btn" onclick="quickAsk('列出所有仓库')">🏗️ 仓库清单</span>
      <span class="ai-quick-btn" onclick="quickAsk('客户余额情况')">💰 客户余额</span>
      <span class="ai-quick-btn" onclick="quickAsk('最近有哪些订单？')">🔄 最近订单</span>
    </div>
    <form class="ai-input-form" onsubmit="sendAIMessage(event)">
      <input type="text" id="ai-input" placeholder="输入问题，如：本月订单量多少？" autocomplete="off" />
      <button type="submit" id="ai-send-btn">发送</button>
    </form>
  </div>
</div>

<script>
function quickAsk(msg) {
  document.getElementById('ai-input').value = msg;
  sendAIMessage(new Event('submit'));
}

function sendAIMessage(e) {
  e.preventDefault();
  var input = document.getElementById('ai-input');
  var msg = input.value.trim();
  if (!msg) return;

  var msgs = document.getElementById('ai-messages');
  var sendBtn = document.getElementById('ai-send-btn');

  // Append user message
  var userDiv = document.createElement('div');
  userDiv.className = 'ai-msg ai-msg-user';
  userDiv.textContent = msg;
  msgs.appendChild(userDiv);
  input.value = '';
  sendBtn.disabled = true;
  sendBtn.textContent = '思考中...';

  // Scroll to bottom
  msgs.scrollTop = msgs.scrollHeight;

  // Create AI response div
  var aiDiv = document.createElement('div');
  aiDiv.className = 'ai-msg ai-msg-ai typing';
  aiDiv.textContent = '🤔 思考中...';
  msgs.appendChild(aiDiv);
  msgs.scrollTop = msgs.scrollHeight;

  // SSE stream via fetch + ReadableStream
  fetch('/api/v1/ai/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: msg})
  }).then(function(response) {
    if (!response.ok) {
      aiDiv.textContent = '❌ AI 服务暂时不可用';
      aiDiv.classList.remove('typing');
      sendBtn.disabled = false;
      sendBtn.textContent = '发送';
      return;
    }
    var reader = response.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';
    var firstChunk = true;

    function read() {
      reader.read().then(function(result) {
        if (result.done) {
          aiDiv.classList.remove('typing');
          if (firstChunk && !aiDiv.textContent.trim()) {
            aiDiv.textContent = '⚠️ 未收到回复，请重试';
          }
          sendBtn.disabled = false;
          sendBtn.textContent = '发送';
          return;
        }
        buffer += decoder.decode(result.value, {stream: true});
        var lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.startsWith('data: ')) {
            var chunk = line.substring(6);
            if (firstChunk) {
              aiDiv.textContent = '';
              firstChunk = false;
            }
            aiDiv.textContent += chunk;
            msgs.scrollTop = msgs.scrollHeight;
          }
        }
        read();
      }).catch(function() {
        aiDiv.classList.remove('typing');
        if (firstChunk) {
          aiDiv.textContent = '❌ 连接中断';
        }
        sendBtn.disabled = false;
        sendBtn.textContent = '发送';
      });
    }
    read();
  }).catch(function() {
    aiDiv.textContent = '❌ 网络错误，请检查连接';
    aiDiv.classList.remove('typing');
    sendBtn.disabled = false;
    sendBtn.textContent = '发送';
  });
}
</script>
</body>
</html>
