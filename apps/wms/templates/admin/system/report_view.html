{{template "base.html" .}}
{{define "breadcrumb"}}{{.Breadcrumb}}{{end}}
{{define "content"}}
{{if .Error}}
<div class="data-table-wrapper" style="padding:32px;text-align:center">
  <p style="color:var(--i56-error);font-size:14px">报表执行失败: {{.Error}}</p>
  <a href="/admin/system/reports" class="btn btn-sm btn-primary mt-4">← 返回报表列表</a>
</div>
{{else}}
<h1 style="margin-bottom:16px">{{.Title}}</h1>
<p style="color:var(--i56-text-secondary);margin-bottom:16px">共 {{.Total}} 行数据</p>
<table class="data-table" style="width:100%">
<thead>
  <tr>{{range .Columns}}<th>{{.}}</th>{{end}}</tr>
</thead>
<tbody>
{{range .Rows}}
<tr>{{range .}}<td>{{.}}</td>{{end}}</tr>
{{end}}
</tbody>
</table>
{{end}}
{{end}}
