{{template "admin_layout.html" .}}
{{define "content"}}
<style>
.ai-chat-wrapper{display:flex;flex-direction:column;height:calc(100vh - 120px);margin:-16px}
.ai-chat-header{background:var(--i56-bg-surface);border-bottom:1px solid var(--i56-border);padding:14px 20px;display:flex;align-items:center;gap:12px}
.ai-chat-header h2{font-size:17px;font-weight:600;color:var(--i56-brand)}
.ai-status{font-size:11px;padding:3px 8px;border-radius:10px;background:#22c55e20;color:#22c55e}
.ai-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.ai-welcome{background:var(--i56-bg-surface);border:1px solid var(--i56-border);border-radius:12px;padding:16px 20px;font-size:14px;color:var(--i56-text-secondary);text-align:center;margin-bottom:8px}
.ai-msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word}
.ai-msg-user{align-self:flex-end;background:var(--i56-brand);color:#fff;border-bottom-right-radius:4px}
.ai-msg-ai{align-self:flex-start;background:var(--i56-bg-surface);border:1px solid var(--i56-border);color:var(--i56-text-primary);border-bottom-left-radius:4px}
.ai-msg-ai.typing{opacity:.7}
.ai-input-wrap{border-top:1px solid var(--i56-border);padding:16px 20px;background:var(--i56-bg-surface)}
.ai-input-form{display:flex;gap:10px}
.ai-input-form input{flex:1;padding:12px 16px;border:1px solid var(--i56-border);border-radius:10px;background:var(--i56-bg-base);color:var(--i56-text-primary);font-size:14px;outline:none}
.ai-input-form input:focus{border-color:var(--i56-brand)}
.ai-input-form button{background:var(--i56-brand);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.ai-input-form button:hover{opacity:.9}
.ai-input-form button:disabled{opacity:.5;cursor:not-allowed}
.ai-quick-btns{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ai-quick-btn{font-size:11px;padding:5px 12px;border-radius:14px;border:1px solid var(--i56-border);background:var(--i56-bg-base);color:var(--i56-text-secondary);cursor:pointer;white-space:nowrap}
.ai-quick-btn:hover{background:var(--i56-brand);color:#fff;border-color:var(--i56-brand)}
</style>
<div class="ai-chat-wrapper">
  <div class="ai-chat-header">
    <span style="font-size:24px">🤖</span>
    <h2>I56 AI 助手</h2>
    <span class="ai-status">● 在线</span>
    <span style="font-size:11px;color:var(--i56-text-muted);margin-left:auto">提问订单、包裹、仓库、财务信息</span>
  </div>
  <div class="ai-messages" id="ai-messages">
    <div class="ai-welcome">
      🤖 <strong>I56 AI 助手</strong> — 我是您的智能仓库助手<br>
      <span style="font-size:12px;color:var(--i56-text-muted)">您可以询问：订单查询 · 包裹状态 · 仓库库存 · 客户信息 · 财务报表</span>
    </div>
  </div>
  <div class="ai-input-wrap">
    <div class="ai-quick-btns">
      <span class="ai-quick-btn" onclick="quickAsk('本月订单量多少？')">📋 订单统计</span>
      <span class="ai-quick-btn" onclick="quickAsk('有哪些包裹？')">📦 包裹列表</span>
      <span class="ai-quick-btn" onclick="quickAsk('列出所有仓库')">🏗️ 仓库清单</span>
      <span class="ai-quick-btn" onclick="quickAsk('客户余额情况')">💰 客户余额</span>
      <span class="ai-quick-btn" onclick="quickAsk('最近有哪些订单？')">🔄 最近订单</span>
    </div>
    <form class="ai-input-form" onsubmit="return sendAIMessage(event)">
      <input type="text" id="ai-input" placeholder="输入问题，如：本月订单量多少？" autocomplete="off">
      <button type="submit" id="ai-send-btn">发送</button>
    </form>
  </div>
</div>
<script>
function quickAsk(msg){document.getElementById('ai-input').value=msg;sendAIMessage(new Event('submit'))}
function sendAIMessage(e){e.preventDefault();var input=document.getElementById('ai-input');var msg=input.value.trim();if(!msg)return false;var msgs=document.getElementById('ai-messages');var btn=document.getElementById('ai-send-btn');var ud=document.createElement('div');ud.className='ai-msg ai-msg-user';ud.textContent=msg;msgs.appendChild(ud);input.value='';btn.disabled=true;btn.textContent='思考中...';msgs.scrollTop=msgs.scrollHeight;var ad=document.createElement('div');ad.className='ai-msg ai-msg-ai typing';ad.textContent='🤔 思考中...';msgs.appendChild(ad);msgs.scrollTop=msgs.scrollHeight;fetch('/api/v1/ai/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})}).then(function(r){if(!r.ok){ad.textContent='❌ AI 服务暂时不可用';ad.classList.remove('typing');btn.disabled=false;btn.textContent='发送';return}var reader=r.body.getReader();var decoder=new TextDecoder();var buffer='';var first=true;function read(){reader.read().then(function(result){if(result.done){ad.classList.remove('typing');if(first&&!ad.textContent.trim())ad.textContent='⚠️ 未收到回复';btn.disabled=false;btn.textContent='发送';return}buffer+=decoder.decode(result.value,{stream:true});var lines=buffer.split('\\n');buffer=lines.pop()||'';for(var i=0;i<lines.length;i++){var line=lines[i];if(line.startsWith('data: ')){var chunk=line.substring(6);if(first){ad.textContent='';first=false}ad.textContent+=chunk;msgs.scrollTop=msgs.scrollHeight}}read()}).catch(function(){ad.classList.remove('typing');if(first)ad.textContent='❌ 连接中断';btn.disabled=false;btn.textContent='发送'})}read()}).catch(function(){ad.textContent='❌ 网络错误';ad.classList.remove('typing');btn.disabled=false;btn.textContent='发送'});return false}
</script>
{{end}}
