{{template "base.html" .}}
{{define "breadcrumb"}}{{.Breadcrumb}}{{end}}
{{define "content"}}
<h1 style="margin-bottom:16px">📊 内置报表</h1>

<table class="data-table" style="width:100%">
<thead>
  <tr><th>报表名称</th><th>描述</th><th>显示方式</th><th>参数</th><th>操作</th></tr>
</thead>
<tbody>
{{range .Reports}}
<tr>
  <td><b>{{.DisplayIcon}} {{.Title}}</b></td>
  <td style="font-size:12px;color:var(--i56-text-muted)"><code>{{.Query}}</code></td>
  <td>{{.DisplayLabel}}</td>
  <td>{{.ParamCount}} 个参数</td>
  <td><a href="/admin/system/reports/view?name={{.Name}}" class="i56-btn i56-btn-sm i56-btn-primary">查看</a></td>
</tr>
{{end}}
</tbody>
</table>
{{end}}
