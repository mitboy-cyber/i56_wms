{{template "admin_layout.html" .}}
{{define "title"}}品牌与外观设置 - I56{{end}}
{{define "content"}}
<div class="i56-page-header">
  <h1 class="i56-page-title">🎨 品牌与外观设置</h1>
  <p class="i56-page-desc">配置网站Logo、Footer及主题颜色</p>
</div>

{{if .SuccessMsg}}
<div style="background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3);padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px">
  ✅ {{.SuccessMsg}}
</div>
{{end}}

<form method="POST" action="/admin/system/brand-settings" enctype="multipart/form-data">

<div class="i56-card" style="margin-bottom:16px">
  <div class="i56-card-header">🏢 品牌信息</div>
  <div class="i56-card-body">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="i56-form-group">
        <label class="i56-form-label">公司名称</label>
        <input type="text" name="company_name" class="i56-form-input" value="{{.CompanyName}}" />
      </div>
      <div class="i56-form-group">
        <label class="i56-form-label">🏷️ Logo 文字</label>
        <input type="text" name="company_logo" class="i56-form-input" value="{{.CompanyLogo}}" />
      </div>
      <div class="i56-form-group">
        <label class="i56-form-label">🖼️ Logo 图片上传</label>
        <input type="file" name="logo_file" accept="image/*" class="i56-form-input" style="font-size:12px" />
        {{if .LogoURL}}<img src="{{.LogoURL}}" style="max-height:40px;margin-top:4px;border-radius:4px" />{{end}}
      </div>
      <div class="i56-form-group">
        <label class="i56-form-label">主题色 (Primary Color)</label>
        <input type="color" name="primary_color" class="i56-form-input" value="{{.PrimaryColor}}" style="height:36px;padding:2px" />
      </div>
    </div>
  </div>
</div>

<div class="i56-card" style="margin-bottom:16px">
  <div class="i56-card-header">📝 Footer 配置</div>
  <div class="i56-card-body">
    <div class="i56-form-group">
      <label class="i56-form-label">Footer 版权信息</label>
      <input type="text" name="footer_text" class="i56-form-input" value="{{.FooterText}}" />
    </div>
  </div>
</div>

<div style="margin-top:16px;display:flex;justify-content:flex-end;gap:8px">
  <button type="submit" class="i56-btn i56-btn-primary">💾 保存设置</button>
</div>

</form>
{{end}}
