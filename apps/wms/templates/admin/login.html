<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理后台登录 - I56 WMS</title>
<link rel="stylesheet" href="/static/css/i56-bdl.css">
<style>
  body.login-page { background: var(--i56-bg-base); }
</style>
</head>
<body class="login-page">
<div class="login-card">
  <div class="login-logo">I</div>
  <div class="login-title">I56 WMS 管理后台</div>
  <div class="login-subtitle">仓库管理系统 · 管理员登录</div>
  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label class="form-label">账号</label>
      <input class="form-input" type="text" name="username" placeholder="请输入员工编号" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" type="password" name="password" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="i56-btn i56-btn-primary w-full" style="width:100%">登录</button>
    {{if .Error}}<p class="text-sm text-center mt-3" style="color:var(--i56-error)">{{.Error}}</p>{{end}}
  </form>
  <div style="margin-top:20px;font-size:11px;color:var(--i56-text-muted);text-align:center">
    测试账号：admin / admin · OP001 / 1234
  </div>
</div>
</body>
</html>
