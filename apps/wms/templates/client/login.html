{{template "base.html" .}}
{{define "title"}}登录 - I56 Client{{end}}
{{define "content"}}
<div class="login-page" style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 44px);background:var(--i56-bg-base)">
  <div class="login-card">
    <div class="login-logo">I</div>
    <div class="login-title">I56 Client</div>
    <div class="login-subtitle">集运客户平台</div>
    {{if .Error}}<div class="toast toast-error mb-3" style="position:static;min-width:auto">{{.Error}}</div>{{end}}
    <form method="post" action="/client/login">
      <div class="form-group"><label class="form-label">账号</label><input type="text" name="username" class="form-input" placeholder="请输入账号" required></div>
      <div class="form-group"><label class="form-label">密码</label><input type="password" name="password" class="form-input" placeholder="请输入密码" required></div>
      <button type="submit" class="btn btn-primary w-full mt-2">登 录</button>
    </form>
  </div>
</div>
{{end}}
