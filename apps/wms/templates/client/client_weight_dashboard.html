{{template "base.html" .}}
{{define "title"}}称重记录{{end}}
{{define "content"}}
<div class="page-title">⚖️ 称重记录</div>
<div class="stat-grid mb-3">
<div class="stat-card"><div class="stat-label">📊 今日笔数</div><div class="stat-value">{{.TodayCount}}</div></div>
<div class="stat-card"><div class="stat-label">⚖️ 平均重量</div><div class="stat-value">{{printf "%.2f" .AvgWeight}}kg</div></div>
</div>
<div class="data-table-wrapper">
<div class="data-table-header">总计 {{.TotalRecords}} 条记录</div>
</div>
{{end}}
