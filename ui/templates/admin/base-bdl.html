<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.Title}} — I56 Admin</title>
<link rel="stylesheet" href="/static/css/i56-bdl.css">
<script src="/static/js/i56-theme.js"></script>
<script src="/static/js/i56-components.js"></script>
<script src="/static/js/i56-command.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--i56-font-sans);background:var(--i56-bg-base);color:var(--i56-text-primary);display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--i56-bg-surface);border-right:1px solid var(--i56-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:width 150ms ease}
.sidebar.collapsed{width:64px}
.sidebar-brand{padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--i56-border)}
.sidebar-brand h1{font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden}
.sidebar nav{flex:1;overflow-y:auto;padding:8px}
.nav-group{margin-bottom:4px}
.nav-group-header{font-size:11px;font-weight:600;text-transform:uppercase;padding:12px 12px 4px;color:var(--i56-text-secondary);letter-spacing:0.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--i56-radius-sm);font-size:14px;color:var(--i56-text-primary);text-decoration:none;transition:background 150ms ease}
.nav-item:hover{background:var(--i56-bg-surface-hover)}
.nav-item.active{background:var(--i56-brand-alpha-10);color:var(--i56-brand);border-left:3px solid var(--i56-brand)}
.nav-item i{font-size:16px;width:20px;text-align:center}
.sidebar-collapse-btn{padding:12px;border-top:1px solid var(--i56-border);cursor:pointer;text-align:center;color:var(--i56-text-secondary);font-size:18px}
.sidebar-collapse-btn:hover{color:var(--i56-text-primary)}
.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh;transition:margin-left 150ms ease}
.sidebar.collapsed+.main,body:has(.sidebar.collapsed) .main{margin-left:64px}
.header{height:56px;background:var(--i56-bg-surface);border-bottom:1px solid var(--i56-border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:16px}
.breadcrumb{font-size:13px;color:var(--i56-text-secondary);display:flex;align-items:center;gap:8px}
.breadcrumb a{color:var(--i56-text-secondary);text-decoration:none}
.breadcrumb a:hover{color:var(--i56-brand)}
.breadcrumb span{color:var(--i56-text-primary)}
.header-right{display:flex;align-items:center;gap:16px}
.search-box{position:relative;width:320px}
.search-box input{width:100%;height:36px;padding:0 16px 0 40px;border:1px solid var(--i56-border);border-radius:var(--i56-radius-sm);background:var(--i56-bg-base);color:var(--i56-text-primary);font-size:13px;outline:none}
.search-box input:focus{border-color:var(--i56-brand);box-shadow:0 0 0 2px var(--i56-brand-alpha-20)}
.search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--i56-text-secondary);font-size:16px}
kbd{display:inline-block;padding:1px 6px;font-size:11px;font-family:var(--i56-font-mono);background:var(--i56-bg-surface-hover);border:1px solid var(--i56-border);border-radius:4px;color:var(--i56-text-secondary)}
.user-dropdown{display:flex;align-items:center;gap:8px;padding:4px 12px;border-radius:var(--i56-radius-sm);cursor:pointer;transition:background 150ms ease}
.user-dropdown:hover{background:var(--i56-bg-surface-hover)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--i56-brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.content{padding:24px;flex:1}
.page-header{margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start}
.page-header h2{font-size:22px;font-weight:700;margin-bottom:4px}
.page-header p{font-size:13px;color:var(--i56-text-secondary)}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--i56-bg-surface);border:1px solid var(--i56-border);border-radius:var(--i56-radius-md);padding:16px;display:flex;flex-direction:column;gap:8px;transition:box-shadow 150ms ease}
.stat-card:hover{box-shadow:var(--i56-shadow-md)}
.stat-card-label{font-size:12px;color:var(--i56-text-secondary);text-transform:uppercase;letter-spacing:0.5px}
.stat-card-value{font-size:28px;font-weight:700;font-family:var(--i56-font-mono)}
.stat-card-delta{font-size:12px;display:flex;align-items:center;gap:4px}
.table-card{background:var(--i56-bg-surface);border:1px solid var(--i56-border);border-radius:var(--i56-radius-md);overflow:hidden}
.table-card-header{padding:16px 20px;border-bottom:1px solid var(--i56-border);display:flex;justify-content:space-between;align-items:center}
.table-card-header h3{font-size:15px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--i56-text-secondary);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--i56-border);background:var(--i56-bg-base)}
td{padding:10px 16px;font-size:13px;border-bottom:1px solid var(--i56-border)}
tr:hover td{background:var(--i56-bg-surface-hover)}
.btn{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 16px;border:none;border-radius:var(--i56-radius-sm);font-size:13px;font-weight:500;cursor:pointer;transition:all 150ms ease;text-decoration:none}
.btn-primary{background:var(--i56-brand);color:#fff}
.btn-primary:hover{background:var(--i56-brand-600)}
.btn-secondary{background:var(--i56-bg-surface-hover);color:var(--i56-text-primary);border:1px solid var(--i56-border)}
.btn-secondary:hover{background:var(--i56-border)}
.btn-ghost{background:transparent;color:var(--i56-text-secondary)}
.btn-ghost:hover{background:var(--i56-bg-surface-hover);color:var(--i56-text-primary)}
.btn-danger{background:var(--i56-danger);color:#fff}
.btn-sm{height:28px;padding:0 10px;font-size:12px}
.badge{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:12px;font-size:11px;font-weight:500}
.badge-brand{background:var(--i56-brand-alpha-10);color:var(--i56-brand)}
.badge-success{background:var(--i56-success-alpha-10);color:var(--i56-success)}
.badge-warning{background:var(--i56-warning-alpha-10);color:var(--i56-warning)}
.badge-danger{background:var(--i56-danger-alpha-10);color:var(--i56-danger)}
.badge-neutral{background:var(--i56-bg-surface-hover);color:var(--i56-text-secondary)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:4px;color:var(--i56-text-primary)}
.form-group input,.form-group select,.form-group textarea{width:100%;height:38px;padding:0 12px;border:1px solid var(--i56-border);border-radius:var(--i56-radius-sm);background:var(--i56-bg-base);color:var(--i56-text-primary);font-size:13px;outline:none}
.form-group input:focus{border-color:var(--i56-brand);box-shadow:0 0 0 2px var(--i56-brand-alpha-20)}
.form-group textarea{height:auto;padding:10px 12px;resize:vertical}
.px-4{padding-left:16px;padding-right:16px}
.py-4{padding-top:16px;padding-bottom:16px}
.text-center{text-align:center}
.text-muted{color:var(--i56-text-secondary)}
.text-sm{font-size:12px}
.empty-state{padding:48px 24px;text-align:center;color:var(--i56-text-secondary)}
.empty-state i{font-size:48px;margin-bottom:12px;display:block;opacity:0.3}
@media(max-width:768px){
.sidebar{width:0;overflow:hidden}
.sidebar.mobile-open{width:240px}
.main{margin-left:0}
}
</style>
</head>
<body>
<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
<div class="sidebar-brand">
<h1>I56</h1>
</div>
<nav>
{{range .MenuGroups}}
<div class="nav-group">
<div class="nav-group-header">{{.Group}}</div>
{{range .Items}}
<a href="{{.URL}}" class="nav-item{{if .Active}} active{{end}}"><span>{{.Icon}}</span><span>{{.Name}}</span></a>
{{end}}
</div>
{{end}}
</nav>
<div class="sidebar-collapse-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">☰</div>
</aside>

<!-- Main -->
<div class="main" id="main-content">
<header class="header">
<div class="header-left">
<div class="breadcrumb">
<a href="/admin">首页</a><span>/</span>
{{range .Breadcrumbs}}<a href="{{.URL}}">{{.Name}}</a><span>/</span>{{end}}
<span>{{.Title}}</span>
</div>
</div>
<div class="header-right">
<div class="search-box">
<i>🔍</i>
<input type="search" placeholder="搜索... (Ctrl+K)" onfocus="I56Command.open()" readonly>
<kbd>⌘K</kbd>
</div>
<div class="user-dropdown">
<div class="user-avatar">{{slice .User.Name 0 1}}</div>
<span>{{.User.Name}}</span>
</div>
<button class="btn btn-secondary btn-sm" onclick="I56Theme.toggle()">🌓</button>
</div>
</header>
<div class="content">
{{block "content" .}}<p>content placeholder</p>{{end}}
</div>
</div>

<!-- Command Palette -->
<i56-command-palette></i56-command-palette>
<i56-ai-bar placeholder="Ask I56..."></i56-ai-bar>
<i56-toast-container position="top-right"></i56-toast-container>

<script>
document.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();I56Command.toggle()}});
</script>
</body>
</html>
